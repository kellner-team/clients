name: Publish Android Lava
concurrency:
  group: publish-android-lava
  cancel-in-progress: true

on:
  workflow_dispatch:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  publish-android-lava:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract keystore
        run: |
          cd androidApp
          echo "${{ secrets.KEYS_TAR_ASC }}" > .keys.tar.gz.asc
          gpg -d --passphrase "${{ secrets.KEYS_PASSPHRASE }}" --batch .keys.tar.gz.asc > .keys.tar.gz
          tar xzf .keys.tar.gz
          cd ..

      - name: Release Android Lava
        run: ./gradlew publishLavaReleaseApps --no-daemon -PkeyPassword=${{ secrets.KEY_PASSWORD }} -PstorePassword=${{ secrets.STORE_PASSWORD }}
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Add version to env
        run: |
          echo "ANDROID_VERSION=$(./gradlew -q currentVersion | sed 's/Project version: //')" >> $GITHUB_ENV

      - name: Slack notification
        run: |
          curl -X POST \
          --header 'Content-type: application/json' \
          --url '${{ secrets.SLACK_WEB_HOOK_URL }}' \
          --data '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 New Android lava version available",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Version:* `'${{ env.ANDROID_VERSION }}'`"
                }
              }
            ]
          }'